<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cloud Runner</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*{margin:0;padding:0}
body{background:#000;overflow:hidden;touch-action:none;display:flex;justify-content:center;align-items:flex-start;padding-top:env(safe-area-inset-top,10px);height:100dvh}
#game-container{position:relative;width:400px;height:711px;overflow:hidden;background:#1a1a2e;border-radius:8px}
canvas{display:block;position:absolute;top:0;left:0;z-index:0}
#jump{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,0.15);border:3px solid rgba(255,255,255,0.3);color:#fff;font-size:24px;cursor:pointer;z-index:100;-webkit-tap-highlight-color:transparent}
#hud{position:absolute;top:40px;right:15px;color:#fff;font:bold 18px monospace;z-index:100;text-align:right;text-shadow:0 0 8px rgba(0,0,0,0.8)}
#msg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font:bold 28px monospace;z-index:100;display:none;text-align:center}
#debug{position:absolute;top:40px;left:10px;color:rgba(255,255,255,0.6);font:12px monospace;z-index:100}
</style>
</head>
<body>
<div id="game-container">
  <div id="hud">
    <span style="color:#ffd700;font-size:16px" id="coinDisp">0 coins</span><br>
    <span style="color:#4ecdc4;font-size:16px" id="levelDisp">Get Ready</span><br>
    <span id="scoreDisp">Score 0</span>
  </div>
  <div id="debug" style="display:none"></div>
  <div id="msg"></div>
  <button id="jump">JUMP</button>
  <canvas id="canvas2d"></canvas>
  <canvas id="overlay" style="z-index:50;pointer-events:none"></canvas>
</div>
<script>
const GW=400,GH=711;
const CONFIG={
  gravity:0.6,jumpForce:-12,jumpCutoff:-4,
  baseSpeed:3,maxSpeedBonus:4,speedDiv:600,
  maxGapMul:26,maxGapCap:160,
  playerW:28,playerH:28,platH:12,
  enemyW:22,enemyH:22,enemyMargin:250,
  flyerBase:90,flyerVar:30,flyerBob:30,
  stageBonus:100,bigCoinChance:0.15,highCoinChance:0.3,
  flyerChance:0.3,flyerMinLvl:5,platDepth:40,
  colors:['#e94560','#533483','#4ecdc4','#45b7d1','#ff6b6b','#a855f7']
};

// ============================================================
// STATE
// ============================================================
let S={W:GW,H:GH,player:null,platforms:[],coins:[],enemies:[],
  particles:[],floats:[],score:0,coinCount:0,speed:0,over:false,
  frame:0,stage:'intro',stageNum:0,jumping:false,held:false,
  mode:'3d',camH:500,camA:1.2,tCamH:500,tCamA:1.2,groundY:0};

// ============================================================
// UTILS
// ============================================================
function rc(){return CONFIG.colors[Math.floor(Math.random()*CONFIG.colors.length)]}
function hex2c(h){return new THREE.Color(parseInt(h.slice(1,3),16)/255,parseInt(h.slice(3,5),16)/255,parseInt(h.slice(5,7),16)/255)}
function overlap(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}
function maxGap(){return Math.min(S.speed*CONFIG.maxGapMul,CONFIG.maxGapCap)}
function ftext(x,y,t,c){S.floats.push({x,y,text:t,color:c||'#ffd700',life:40,vy:-1.5})}

// ============================================================
// MESSAGE OVERLAY — always-on-top canvas for large messages
// ============================================================
const overlay=document.getElementById('overlay');
const ox=overlay.getContext('2d');
overlay.width=GW;overlay.height=GH;
let overlayMsg=null;

function showOverlay(lines,color){overlayMsg={lines,color:color||'#fff'}}
function hideOverlay(){overlayMsg=null}
function drawOverlay(){
  ox.clearRect(0,0,GW,GH);
  if(!overlayMsg) return;
  let t=performance.now()*0.001;
  let pulse=0.6+Math.sin(t*2)*0.4;
  let scale=1+Math.sin(t*1.5)*0.08;
  ox.save();
  ox.globalAlpha=pulse;
  ox.fillStyle=overlayMsg.color;
  ox.textAlign='center';
  ox.shadowColor='#4ecdc4';
  ox.shadowBlur=15;
  let baseSize=18;
  let startY=GH*0.33;
  ox.translate(GW/2,startY);
  ox.scale(scale,scale);
  ox.translate(-GW/2,-startY);
  ox.font='bold '+baseSize+'px monospace';
  for(let i=0;i<overlayMsg.lines.length;i++){
    ox.fillText(overlayMsg.lines[i],GW/2,startY+i*(baseSize+10));
  }
  ox.restore();
}

// ============================================================
// SPAWNING
// ============================================================
function spawnCoin(x,y,big){
  S.coins.push({x,y,w:big?20:14,h:big?20:14,bob:Math.random()*6.28,big,val:big?3:1,mesh:null});
}
function spawnCoinsOn(p){
  for(let i=0,n=2+Math.floor(Math.random()*3);i<n;i++){
    spawnCoin(p.x+20+i*30,Math.random()<CONFIG.highCoinChance?p.y-65:p.y-30,Math.random()<CONFIG.bigCoinChance);
  }
}
function spawnGround(x,y){
  S.enemies.push({x,y:y-CONFIG.enemyH,w:CONFIG.enemyW,h:CONFIG.enemyH,fly:false,hop:0,hopT:0,mesh:null});
}
function spawnFlyer(x,py){
  let fy=py-CONFIG.flyerBase-Math.random()*CONFIG.flyerVar;
  S.enemies.push({x,y:fy,w:CONFIG.enemyW,h:CONFIG.enemyH,fly:true,baseY:fy,phase:Math.random()*6.28,mesh:null});
}

// ============================================================
// LEVEL BUILDING — generates all platforms for a level at once
// Places a levelEnd marker at the end. Level switches when player reaches it.
// ============================================================
function buildLevel(){
  let last=S.platforms[S.platforms.length-1];
  let lvl=S.stageNum;
  let d=Math.min(lvl/20,1);

  // Every level starts with a wide safe platform (2 screens)
  let safeW=GW*2;
  let ny=Math.max(GH*0.35,Math.min(GH*0.8,last.y));
  let safe={x:last.x+last.w,y:ny,w:safeW,h:CONFIG.platH,color:rc(),mesh:null};
  S.platforms.push(safe);
  if(S.stage!=='intro'){
    spawnCoinsOn({x:safe.x+50,y:safe.y,w:safeW*0.3,h:0});
    spawnCoinsOn({x:safe.x+safeW*0.5,y:safe.y,w:safeW*0.3,h:0});
  }
  last=safe;

  // 2D levels need 2.4x more distance to feel equal to 3D
  let scale=S.mode==='2d'?2.4:1;

  if(S.stage==='intro'){
    // Intro: no coins, show tutorial
    showOverlay(['HOLD DOWN','JUMP TO','JUMP HIGHER'],'#fff');
  } else if(S.stage==='enemies'){
    // Enemy level: mega platform(s) with enemies
    // In 2D mode, generate multiple mega-platforms instead of scaling one
    let megaCount=S.mode==='2d'?2:1;
    for(let mi=0;mi<megaCount;mi++){
    let megaW=GW*3+Math.random()*GW;
    let mp={x:last.x+last.w,y:last.y,w:megaW,h:CONFIG.platH,color:rc(),mesh:null};
    S.platforms.push(mp);
    let n=2+Math.floor(Math.random()*2+d*2);
    let margin=CONFIG.enemyMargin,usable=megaW-margin*2,sp=usable/(n+1);
    for(let e=0;e<n;e++){
      let jitter=(Math.random()-0.5)*sp*0.4;
      let ex=mp.x+margin+sp*(e+1)-11+jitter;
      if(lvl>=CONFIG.flyerMinLvl&&Math.random()<CONFIG.flyerChance) spawnFlyer(ex,mp.y);
      else spawnGround(ex,mp.y);
    }
    for(let e=0;e<n;e++){
      let cx=mp.x+margin+sp*(e+0.5);
      spawnCoin(cx,mp.y-30,Math.random()<0.2);
    }
    last=mp;
    }
  } else {
    // Gap level: series of platforms, count grows with level
    let count=Math.round((8+lvl*2)*scale);
    for(let i=0;i<count;i++){
      let mg=maxGap();
      let gap=50+d*(mg-50)+Math.random()*20;
      let pny=last.y+(Math.random()*40-20);
      pny=Math.max(GH*0.35,Math.min(GH*0.8,pny));
      let nw=130+Math.random()*80;
      let np={x:last.x+last.w+gap,y:pny,w:nw,h:CONFIG.platH,color:rc(),mesh:null};
      S.platforms.push(np);
      if(Math.random()<0.7) spawnCoinsOn(np);
      last=np;
    }
  }

  // Level-end marker: dark platform, triggers level switch when player reaches it
  let endW=GW*1.5;
  let endY=Math.max(GH*0.35,Math.min(GH*0.8,last.y));
  let gap=S.stage==='gaps'?80:0;
  S.platforms.push({x:last.x+last.w+gap,y:endY,w:endW,h:CONFIG.platH,color:'#1a1a2e',mesh:null,levelEnd:true,fired:false});
}

// ============================================================
// INPUT
// ============================================================
function jStart(){
  if(S.over){init();return}
  if(S.player.onGround){
    S.player.vy=CONFIG.jumpForce;S.player.onGround=false;
    S.jumping=true;S.held=true;
    for(let i=0;i<8;i++) S.particles.push({x:S.player.x+14,y:S.player.y+28,vx:(Math.random()-0.5)*4,vy:Math.random()*-3,life:15,color:'#00ff88',sz:3+Math.random()*3});
  }
}
function jEnd(){
  S.held=false;
  if(S.jumping&&S.player.vy<CONFIG.jumpCutoff) S.player.vy=CONFIG.jumpCutoff;
  S.jumping=false;
}
function setupInput(){
  let b=document.getElementById('jump');
  b.addEventListener('mousedown',jStart);b.addEventListener('mouseup',jEnd);b.addEventListener('mouseleave',jEnd);
  b.addEventListener('touchstart',e=>{e.preventDefault();jStart()});b.addEventListener('touchend',e=>{e.preventDefault();jEnd()});
  addEventListener('keydown',e=>{if((e.code==='Space'||e.code==='ArrowUp')&&!e.repeat)jStart()});
  addEventListener('keyup',e=>{if(e.code==='Space'||e.code==='ArrowUp')jEnd()});
}

// ============================================================
// RENDER MODE SWITCHING
// ============================================================
function switchMode(){
  let l=S.stageNum;
  if(l<=1) S.mode='3d';
  else if(l%2===0) S.mode='2d';
  else{
    S.mode='3d';
    // Slight random variations from the base camera
    S.tCamH=600;
    S.tCamA=1.2;
    S.camYOffset=(Math.random()-0.5)*80;   // slightly higher or lower
    S.camLookYOffset=(Math.random()-0.5)*40; // look up or down a bit
    S.camXOffset=(Math.random()-0.5)*60;   // slightly left/right
    S.camZExtra=Math.random()*100;         // slightly farther back
  }
  c2d.style.display=S.mode==='2d'?'block':'none';
  ren.domElement.style.display=S.mode==='3d'?'block':'none';
  document.getElementById('debug').textContent=S.mode.toUpperCase();
}

// ============================================================
// PHYSICS & GAME LOGIC
// ============================================================
function update(){
  if(S.over) return;
  S.frame++;
  S.speed=CONFIG.baseSpeed+Math.min(S.score/CONFIG.speedDiv,CONFIG.maxSpeedBonus);

  // Gravity & movement
  S.player.vy+=CONFIG.gravity;
  S.player.y+=S.player.vy;
  S.player.onGround=false;

  // Scroll everything left
  for(let p of S.platforms) p.x-=S.speed;
  for(let c of S.coins) c.x-=S.speed;
  for(let e of S.enemies) e.x-=S.speed;

  // Platform collision
  for(let p of S.platforms){
    if(S.player.vy>=0&&S.player.x+S.player.w>p.x&&S.player.x<p.x+p.w
      &&S.player.y+S.player.h>=p.y&&S.player.y+S.player.h<=p.y+p.h+10){
      S.player.y=p.y-S.player.h;S.player.vy=0;S.player.onGround=true;
    }
  }

  // LEVEL END CHECK — player physically reaches the marker platform
  for(let p of S.platforms){
    if(p.levelEnd&&!p.fired&&S.player.x>p.x+p.w*0.3){
      p.fired=true;
      let wasIntro=S.stage==='intro';

      // Advance stage type
      if(S.stage==='intro') S.stage='gaps';
      else if(S.stage==='gaps') S.stage='enemies';
      else S.stage='gaps';

      if(wasIntro){
        // Intro silently transitions to level 1
        S.stageNum=1;hideOverlay();
        ftext(S.player.x+20,S.player.y-50,'LEVEL 1','#fff');
      } else {
        // Real level complete — award points
        S.stageNum++;
        S.score+=CONFIG.stageBonus;
        ftext(S.player.x,S.player.y-20,'+'+CONFIG.stageBonus+' STAGE CLEAR','#4ecdc4');
        ftext(S.player.x+20,S.player.y-50,'LEVEL '+S.stageNum,'#fff');
      }

      // Smoke particles
      for(let i=0;i<30;i++){
        S.particles.push({x:S.player.x+50+(Math.random()-0.5)*200,y:S.player.y-20-Math.random()*60,
          vx:(Math.random()-0.5)*2,vy:-0.5-Math.random()*1.5,life:50+Math.random()*30,
          color:['#4ecdc4','#a855f7','#fff'][i%3],sz:4+Math.random()*6});
      }

      document.getElementById('levelDisp').textContent='Level '+S.stageNum;
      switchMode();
      buildLevel();
    }
  }

  // Coin collection
  for(let i=S.coins.length-1;i>=0;i--){
    let c=S.coins[i],cy=c.y+Math.sin(S.frame*0.08+c.bob)*5;
    if(overlap(S.player,{x:c.x,y:cy,w:c.w,h:c.h})){
      S.coinCount+=c.val;S.score+=c.val;
      ftext(c.x,cy,'+'+c.val,c.val>1?'#ff69b4':'#ffd700');
      for(let j=0;j<6;j++) S.particles.push({x:c.x+7,y:cy+7,vx:(Math.random()-0.5)*5,vy:(Math.random()-0.5)*5,life:20,color:'#ffd700',sz:3});
      if(c.mesh&&c.mesh.parent) scene.remove(c.mesh);
      S.coins.splice(i,1);
    }
  }

  // Enemy update & collision
  for(let e of S.enemies){
    if(!e.fly){e.hopT++;e.hop=Math.abs(Math.sin(e.hopT*0.08))*8}
    let ey=e.fly?e.y:(e.y-e.hop);
    if(overlap(S.player,{x:e.x,y:ey,w:e.w,h:e.h})){
      S.over=true;
      for(let j=0;j<15;j++) S.particles.push({x:S.player.x+14,y:S.player.y+14,vx:(Math.random()-0.5)*8,vy:(Math.random()-0.5)*8,life:30,color:'#ff0044',sz:4});
      document.getElementById('msg').style.display='block';
      document.getElementById('msg').innerHTML='GAME OVER<br><span style="font-size:16px">Score: '+S.score+' | Coins: '+S.coinCount+' | Level: '+S.stageNum+'<br>Tap to restart</span>';
      return;
    }
  }

  // Cleanup offscreen + remove 3D meshes
  S.platforms=S.platforms.filter(p=>{if(p.x+p.w<-50){if(p.mesh&&p.mesh.parent)scene.remove(p.mesh);return false}return true});
  S.coins=S.coins.filter(c=>{if(c.x<-50){if(c.mesh&&c.mesh.parent)scene.remove(c.mesh);return false}return true});
  S.enemies=S.enemies.filter(e=>{if(e.x<-50){if(e.mesh&&e.mesh.parent)scene.remove(e.mesh);return false}return true});

  // HUD
  document.getElementById('scoreDisp').textContent='Score '+S.score;
  document.getElementById('coinDisp').textContent=S.coinCount+' coins';

  // Trail particles
  if(S.frame%3===0&&S.player.onGround) S.particles.push({x:S.player.x,y:S.player.y+S.player.h,vx:-S.speed*0.5,vy:Math.random()*-1,life:10,color:'rgba(255,255,255,0.3)',sz:2});
  S.particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life--});
  S.particles=S.particles.filter(p=>p.life>0);
  S.floats.forEach(f=>{f.y+=f.vy;f.life--});
  S.floats=S.floats.filter(f=>f.life>0);

  // Fall death
  if(S.player.y>GH+50){
    S.over=true;document.getElementById('msg').style.display='block';
    document.getElementById('msg').innerHTML='GAME OVER<br><span style="font-size:16px">Score: '+S.score+' | Coins: '+S.coinCount+' | Level: '+S.stageNum+'<br>Tap to restart</span>';
  }
}

// ============================================================
// 2D RENDERER
// ============================================================
const c2d=document.getElementById('canvas2d');const ctx=c2d.getContext('2d');c2d.width=GW;c2d.height=GH;

function draw2D(){
  let x=ctx;
  let g=x.createLinearGradient(0,0,0,GH);g.addColorStop(0,'#0f0c29');g.addColorStop(0.5,'#302b63');g.addColorStop(1,'#24243e');
  x.fillStyle=g;x.fillRect(0,0,GW,GH);
  x.fillStyle='rgba(255,255,255,0.5)';
  for(let i=0;i<50;i++) x.fillRect(((i*137+S.frame*0.2)%GW),((i*97)%GH)*0.6,1.5,1.5);

  for(let p of S.platforms){x.fillStyle=p.color;x.shadowColor=p.color;x.shadowBlur=8;x.fillRect(p.x,p.y,p.w,p.h);x.shadowBlur=0;x.fillStyle='rgba(255,255,255,0.15)';x.fillRect(p.x,p.y,p.w,3)}

  for(let c of S.coins){let cy=c.y+Math.sin(S.frame*0.08+c.bob)*5,r=c.big?10:7;x.fillStyle=c.big?'#ff69b4':'#ffd700';x.shadowColor=x.fillStyle;x.shadowBlur=c.big?15:10;x.beginPath();x.arc(c.x+r,cy+r,r,0,6.28);x.fill();x.shadowBlur=0;x.fillStyle=c.big?'#ffb6d9':'#fff8b0';x.beginPath();x.arc(c.x+r-2,cy+r-2,r*0.4,0,6.28);x.fill()}

  for(let e of S.enemies){
    if(e.fly){let fy=e.baseY+Math.sin(S.frame*0.05+e.phase)*CONFIG.flyerBob;e.y=fy;x.fillStyle='#9b59b6';x.shadowColor='#9b59b6';x.shadowBlur=12;x.beginPath();x.arc(e.x+11,fy+11,11,0,6.28);x.fill();x.shadowBlur=0;let wf=Math.sin(S.frame*0.15+e.phase)*6;x.fillStyle='#8e44ad';x.beginPath();x.moveTo(e.x,fy+8);x.lineTo(e.x-12,fy+2+wf);x.lineTo(e.x-4,fy+14);x.fill();x.beginPath();x.moveTo(e.x+22,fy+8);x.lineTo(e.x+34,fy+2-wf);x.lineTo(e.x+26,fy+14);x.fill();x.fillStyle='#ff0';x.fillRect(e.x+5,fy+7,4,4);x.fillRect(e.x+13,fy+7,4,4);x.fillStyle='#000';x.fillRect(e.x+7,fy+9,2,2);x.fillRect(e.x+15,fy+9,2,2)}
    else{let h=e.hop;x.fillStyle='#ff0044';x.shadowColor='#ff0044';x.shadowBlur=10;x.fillRect(e.x,e.y-h,e.w,e.h);x.shadowBlur=0;x.fillStyle='#ff4477';for(let s=0;s<3;s++){let sx=e.x+3+s*8;x.beginPath();x.moveTo(sx,e.y-h);x.lineTo(sx+4,e.y-h-6);x.lineTo(sx+8,e.y-h);x.fill()}x.fillStyle='#fff';x.fillRect(e.x+4,e.y-h+6,5,5);x.fillRect(e.x+13,e.y-h+6,5,5);x.fillStyle='#000';x.fillRect(e.x+6,e.y-h+8,3,3);x.fillRect(e.x+15,e.y-h+8,3,3)}
  }

  for(let p of S.particles){x.globalAlpha=p.life/20;x.fillStyle=p.color;x.fillRect(p.x,p.y,p.sz,p.sz)}x.globalAlpha=1;
  for(let f of S.floats){x.globalAlpha=f.life/40;x.fillStyle=f.color;x.font='bold 14px monospace';x.fillText(f.text,f.x,f.y)}x.globalAlpha=1;

  x.fillStyle='#00ff88';x.shadowColor='#00ff88';x.shadowBlur=15;x.fillRect(S.player.x,S.player.y,S.player.w,S.player.h);x.shadowBlur=0;
  x.fillStyle='#fff';x.fillRect(S.player.x+16,S.player.y+7,6,6);x.fillRect(S.player.x+16,S.player.y+16,6,6);
  x.fillStyle='#000';x.fillRect(S.player.x+19,S.player.y+9,3,3);x.fillRect(S.player.x+19,S.player.y+18,3,3);

}

// ============================================================
// 3D SETUP & RENDERER
// ============================================================
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(60,GW/GH,1,5000);
const ren=new THREE.WebGLRenderer({antialias:true});
ren.setSize(GW,GH);ren.setPixelRatio(window.devicePixelRatio);
ren.domElement.style.position='absolute';ren.domElement.style.top='0';ren.domElement.style.left='0';ren.domElement.style.zIndex='0';

scene.add(new THREE.AmbientLight(0x404060,0.6));
let dl=new THREE.DirectionalLight(0xffffff,0.8);dl.position.set(200,-300,500);scene.add(dl);
const plight=new THREE.PointLight(0x00ff88,1,500);scene.add(plight);
scene.background=new THREE.Color(0x0f0c29);scene.fog=new THREE.Fog(0x0f0c29,800,2000);

let sv=[];for(let i=0;i<200;i++)sv.push((Math.random()-0.5)*2000,-(Math.random()*800),(Math.random()-0.5)*1000-200);
let sg=new THREE.BufferGeometry();sg.setAttribute('position',new THREE.Float32BufferAttribute(sv,3));
scene.add(new THREE.Points(sg,new THREE.PointsMaterial({color:0xffffff,size:2,transparent:true,opacity:0.6})));

const pmesh=new THREE.Mesh(new THREE.BoxGeometry(28,28,28),new THREE.MeshPhongMaterial({color:0x00ff88,emissive:0x004422,shininess:80}));scene.add(pmesh);
let ewm=new THREE.MeshBasicMaterial({color:0xffffff}),ebm=new THREE.MeshBasicMaterial({color:0x000000});
let eyeR=new THREE.Mesh(new THREE.BoxGeometry(6,6,2),ewm);eyeR.position.set(4,-4,15);pmesh.add(eyeR);
let eyeL=new THREE.Mesh(new THREE.BoxGeometry(6,6,2),ewm);eyeL.position.set(4,5,15);pmesh.add(eyeL);
eyeR.add(new THREE.Mesh(new THREE.BoxGeometry(3,3,2),ebm).translateZ(1));
eyeL.add(new THREE.Mesh(new THREE.BoxGeometry(3,3,2),ebm).translateZ(1));

let pmats={};function gpm(c){if(!pmats[c])pmats[c]=new THREE.MeshPhongMaterial({color:hex2c(c),shininess:40});return pmats[c]}
const coinMat=new THREE.MeshPhongMaterial({color:0xffd700,emissive:0x443300,shininess:100});
const bigCoinMat=new THREE.MeshPhongMaterial({color:0xff69b4,emissive:0x441133,shininess:100});
const enemyMat=new THREE.MeshPhongMaterial({color:0xff0044,emissive:0x440011,shininess:60});
const flyerMat=new THREE.MeshPhongMaterial({color:0x9b59b6,emissive:0x2d1b3d,shininess:60});
const spikeMat=new THREE.MeshPhongMaterial({color:0xff4477});

function draw3D(){
  S.camH+=(S.tCamH-S.camH)*0.02;S.camA+=(S.tCamA-S.camA)*0.02;
  if(!S.groundY) S.groundY=-S.player.y;
  if(S.player.onGround) S.groundY+=(-S.player.y-S.groundY)*0.05;
  let px=S.player.x,py=S.groundY;
  // Over-the-shoulder: tight behind player, nearly straight ahead
  camera.position.set(px-60+S.camXOffset, py+35+S.camYOffset, 80+S.camZExtra);
  camera.lookAt(px+350+S.camXOffset*0.5, py+S.camLookYOffset, 0);
  plight.position.set(px,-S.player.y+20,30);
  pmesh.position.set(px+14,-S.player.y-14,0);pmesh.rotation.z=S.player.vy*0.02;

  for(let p of S.platforms){
    if(!p.mesh){p.mesh=new THREE.Mesh(new THREE.BoxGeometry(p.w,p.h,CONFIG.platDepth),gpm(p.color));scene.add(p.mesh)}
    p.mesh.position.set(p.x+p.w/2,-(p.y+p.h/2),0);
  }
  for(let c of S.coins){
    let cy=c.y+Math.sin(S.frame*0.08+c.bob)*5;
    if(!c.mesh){c.mesh=new THREE.Mesh(new THREE.SphereGeometry(c.big?10:7,12,12),c.big?bigCoinMat:coinMat);scene.add(c.mesh)}
    c.mesh.position.set(c.x+c.w/2,-(cy+c.h/2),0);c.mesh.rotation.y=S.frame*0.05;
  }
  for(let e of S.enemies){
    if(e.fly){
      let fy=e.baseY+Math.sin(S.frame*0.05+e.phase)*CONFIG.flyerBob;e.y=fy;
      if(!e.mesh){let g=new THREE.Group(),b=new THREE.Mesh(new THREE.SphereGeometry(11,8,8),flyerMat);g.add(b);let wm=new THREE.MeshPhongMaterial({color:0x8e44ad,side:THREE.DoubleSide}),wL=new THREE.Mesh(new THREE.PlaneGeometry(16,10),wm),wR=new THREE.Mesh(new THREE.PlaneGeometry(16,10),wm);wL.position.z=-14;wR.position.z=14;g.add(wL);g.add(wR);e.mesh=g;e.mesh.userData={wL,wR};scene.add(g)}
      e.mesh.position.set(e.x+11,-(fy+11),0);let wf=Math.sin(S.frame*0.15+e.phase)*0.5;e.mesh.userData.wL.rotation.x=wf;e.mesh.userData.wR.rotation.x=-wf;
    } else {
      let h=e.hop;
      if(!e.mesh){let g=new THREE.Group(),b=new THREE.Mesh(new THREE.BoxGeometry(e.w,e.h,e.w),enemyMat);g.add(b);for(let s=0;s<3;s++){let sp=new THREE.Mesh(new THREE.ConeGeometry(4,8,4),spikeMat);sp.position.set(-8+s*8,e.h/2+4,0);g.add(sp)}e.mesh=g;scene.add(g)}
      e.mesh.position.set(e.x+11,-(e.y-h+11),0);
    }
  }

  ren.render(scene,camera);
  // Float text overlay
  ctx.clearRect(0,0,GW,GH);
  for(let f of S.floats){ctx.globalAlpha=f.life/40;ctx.fillStyle=f.color;ctx.font='bold 14px monospace';ctx.fillText(f.text,f.x,f.y)}
  ctx.globalAlpha=1;
}

// ============================================================
// INIT & LOOP
// ============================================================
function clearScene(){
  for(let p of S.platforms) if(p.mesh&&p.mesh.parent) scene.remove(p.mesh);
  for(let c of S.coins) if(c.mesh&&c.mesh.parent) scene.remove(c.mesh);
  for(let e of S.enemies) if(e.mesh&&e.mesh.parent) scene.remove(e.mesh);
}

function init(){
  clearScene();
  S.player={x:GW*0.3,y:0,vy:0,w:CONFIG.playerW,h:CONFIG.playerH,onGround:false};
  S.platforms=[];S.coins=[];S.enemies=[];S.particles=[];S.floats=[];
  S.score=0;S.coinCount=0;S.speed=CONFIG.baseSpeed;S.over=false;S.frame=0;
  S.stage='intro';S.stageNum=0;S.jumping=false;S.held=false;
  S.mode='3d';S.tCamH=600;S.tCamA=1.2;S.camH=600;S.camA=1.2;S.groundY=0;
  S.camYOffset=0;S.camLookYOffset=0;S.camXOffset=0;S.camZExtra=0;
  document.getElementById('msg').style.display='none';
  document.getElementById('levelDisp').textContent='Get Ready';
  document.getElementById('scoreDisp').textContent='Score 0';
  document.getElementById('coinDisp').textContent='0 coins';
  document.getElementById('debug').textContent='3D';
  c2d.style.display='none';ren.domElement.style.display='block';

  // Small starting pad, then buildLevel creates the intro content
  let y=GH*0.7;
  S.platforms.push({x:0,y,w:200,h:CONFIG.platH,color:rc(),mesh:null});
  S.player.y=y-S.player.h;
  buildLevel();
}

function loop(){
  if(!S.over) update();
  if(S.mode==='3d') draw3D(); else draw2D();
  drawOverlay();
  requestAnimationFrame(loop);
}

let gc=document.getElementById('game-container');
gc.appendChild(ren.domElement);
setupInput();init();loop();
</script>
